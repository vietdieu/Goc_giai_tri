<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🧘 Góc thư giãn</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        .btn {
            display: block;
            width: 100%;
            background: #4f46e5;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 1rem;
            margin-bottom: 16px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #4f46e5;
        }
        .note {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧘 Góc thư giãn</h1>
    <!-- Thêm các trò chơi vào đây -->
    <a href="#" class="btn">🎮 flappy Bird</a>
    <a href="#" class="btn">🧩 Trò chơi 2</a>
    <a href="#" class="btn">🎲 Trò chơi 3</a>
    <div class="note">✨ Chọn trò chơi để giải trí và học tập. Mỗi trò chơi sẽ mở trong tab mới.</div>
</div>
</body>
</html>
