<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🧘 Games vui học</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        .tab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 10px rgba(79,70,229,0.3);
        }
        .iframe-container {
            width: 100%;
            height: 70vh;
            background: #f8fafc;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .note {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧘 Vui học Scratch</h1>
    <div class="tab-list" id="tabList">
        <button class="tab-btn" data-url="https://vietdieu.github.io/Goc_giai_tri/flappyBird.html">🐤 Flappy Bird</button>
        <button class="tab-btn" data-url="https://vietdieu.github.io/Goc_giai_tri/Mecung.html">🕹️ Mê cung</button>
        <button class="tab-btn" data-url="https://vietdieu.github.io/Goc_giai_tri/Dichngonngu.html">🌍 Dịch ngôn ngữ</button>
        <button class="tab-btn" data-url="https://vietdieu.github.io/Goc_giai_tri/caloncabe.html">🐟 Cá lớn ăn cá bé</button>
        <button class="tab-btn" data-url="https://vietdieu.github.io/Goc_giai_tri/hungtraicay.html">🍇 Hứng hoa quả</button>
    </div>
     <div class="iframe-container" id="gameFrameContainer">
        <!-- Iframe sẽ được tạo động bằng JavaScript -->
    </div>
    <div class="note">✨ Chọn trò chơi để trải nghiệm. Mỗi trò chơi sẽ hiển thị trong khung.</div>
</div>

<script>
    const tabs = document.querySelectorAll('.tab-btn');
    const container = document.getElementById('gameFrameContainer');

    // Hàm tạo iframe mới
    function createIframe(src) {
        // Xóa iframe cũ nếu có
        const oldIframe = container.querySelector('iframe');
        if (oldIframe) {
            oldIframe.remove();
        }
        // Tạo iframe mới
        const newIframe = document.createElement('iframe');
        newIframe.src = src;
        newIframe.id = 'gameFrame';
        newIframe.allowFullscreen = true;
        container.appendChild(newIframe);
    }

    // Khởi tạo: tải trò chơi đầu tiên
    if (tabs.length > 0) {
        createIframe(tabs[0].dataset.url);
        tabs[0].classList.add('active');
    }

    // Xử lý sự kiện click tab
    tabs.forEach(btn => {
        btn.addEventListener('click', function() {
            // Xóa active class khỏi tất cả
            tabs.forEach(b => b.classList.remove('active'));
            // Thêm active cho tab hiện tại
            this.classList.add('active');
            // Tạo iframe mới
            createIframe(this.dataset.url);
        });
    });
</script>
</body>
</html>
