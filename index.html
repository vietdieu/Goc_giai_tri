<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🧘 Games vui học</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }
        .tab-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #4f46e5;
            color: white;
            box-shadow: 0 4px 10px rgba(79,70,229,0.3);
        }
        .iframe-container {
            position: relative;
            width: 100%;
            height: 70vh;
            background: #f8fafc;
            border-radius: 1rem;
            overflow: hidden;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .iframe-container iframe.active {
            display: block;
        }
        .note {
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧘 Games vui Scratch</h1>
    <div class="tab-list" id="tabList">
        <button class="tab-btn active" data-target="flappy">🐤 Flappy Bird</button>
        <button class="tab-btn" data-target="mecung">🕹️ Mê cung</button>
        <button class="tab-btn" data-target="dichngonngu">🌍 Dịch ngôn ngữ</button>
        <button class="tab-btn" data-target="caloncabe">🐟 Cá lớn ăn cá bé</button>
        <button class="tab-btn" data-target="hungtraicay">🍇 Hứng hoa quả</button>
    </div>
    <div class="iframe-container">
        <iframe id="flappy" src="https://vietdieu.github.io/Goc_giai_tri/flappyBird.html" class="active"></iframe>
        <iframe id="mecung" src="https://vietdieu.github.io/Goc_giai_tri/Mecung.html"></iframe>
        <iframe id="dichngonngu" src="https://vietdieu.github.io/Goc_giai_tri/Dichngonngu.html"></iframe>
        <iframe id="caloncabe" src="https://vietdieu.github.io/Goc_giai_tri/caloncabe.html"></iframe>
        <iframe id="hungtraicay" src="https://vietdieu.github.io/Goc_giai_tri/hungtraicay.html"></iframe>
    </div>
    <div class="note">✨ Chọn trò chơi để trải nghiệm. Mỗi trò chơi sẽ hiển thị trong khung.</div>
</div>

<script>
    const tabs = document.querySelectorAll('.tab-btn');
    const iframes = document.querySelectorAll('.iframe-container iframe');

    tabs.forEach(btn => {
        btn.addEventListener('click', function() {
            tabs.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            const target = this.dataset.target;
            iframes.forEach(iframe => {
                iframe.classList.remove('active');
                if (iframe.id === target) {
                    iframe.classList.add('active');
                }
            });
        });
    });
</script>
</body>
</html>
